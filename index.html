<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PeakeBot - Chessie</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>

  <div class="app-shell terminal-layout">
    <main class="main-terminal-panel">
      <section class="terminal panel">
        <h2>Main Terminal</h2>
        <div id="terminal-window" class="terminal-window"></div>
        <form id="terminal-form" class="terminal-form">
          <input id="terminal-input" type="text" placeholder="Type a command..." autocomplete="off" />
          <button type="submit">Run</button>
        </form>
      </section>
    </main>
    <aside class="right-sidebar">
      <section class="npc-window panel">
        <h2>NPC Window</h2>
        <div id="npc-content" class="npc-content"></div>
      </section>
      <section class="debug-menu panel">
        <h2>Debug Menu</h2>
        <div id="debug-content" class="debug-content"></div>
      </section>
    </aside>
  </div>

  <script type="module" src="./app.js"></script>
</body>
</html>
