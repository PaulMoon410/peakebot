<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PeakeBot</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>

  <div class="app-shell terminal-only-layout">
    <main class="main-terminal-panel">
      <section class="terminal panel">
        <h2>Main Terminal</h2>
        <div id="terminal-window" class="terminal-window"></div>
        <form id="terminal-form" class="terminal-form">
          <input id="terminal-input" type="text" placeholder="Type a command..." autocomplete="off" />
          <button type="submit">Run</button>
        </form>
      </section>
    </main>
  </div>

  <footer class="footer-version">
    <span id="version-string">PeakeBot (AI Terminal) Version v1.0.1</span>
  </footer>
  <script type="module" src="./app.js"></script>
</body>
</html>
