<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PeakeBot</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>

  <div class="terminal-shell-outer">
    <div class="terminal-shell-window">
      <div id="terminal-window" class="terminal-window"></div>
      <form id="terminal-form" class="terminal-form">
        <input id="terminal-input" type="text" placeholder="Type a command..." autocomplete="off" />
        <button type="submit">Run</button>
      </form>
    </div>
  </div>

  <!-- Version banner is now inside the terminal window -->
  <script type="module" src="./app.js"></script>
</body>
</html>
